{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'pages/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'pages/css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'pages/css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'pages/css/guide.css' %}">
    <link rel="stylesheet" href="{% static 'pages/css/components.css' %}">
    <link rel="stylesheet" href="{% static 'pages/css/workout-form.css' %}">
</head>
<body>

<h1>Регистрация</h1>

<form id="registerForm" novalidate>
    <label>Логин</label>
    <input 
        type="text" 
        id="login" 
        required 
        minlength="3"
        pattern="[a-zA-Z0-9_]+"
        placeholder="Только буквы и цифры"
    >

    <label>Email</label>
    <input 
        type="email" 
        id="email" 
        required 
        placeholder="example@mail.com"
    >

    <label>Пароль</label>
    <input 
        type="password" 
        id="password" 
        required 
        minlength="8"
        placeholder="Минимум 8 символов"
    >

    <button type="submit">Создать аккаунт</button>
</form>

<script src="{% static 'pages/js/api.js' %}"></script>
<script src="{% static 'pages/js/auth.js' %}"></script>
</body>
</html>
