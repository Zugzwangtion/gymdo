<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить тренировку</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Добавить тренировку</h1>

<form id="workoutForm">

    <label>Дата:</label>
    <input type="date" id="date" required>

    <label>Длительность (мин):</label>
    <input 
    type="number" 
    id="duration" 
    min="1" 
    max="300"
    required 
    placeholder="минуты">

    <div id="exercisesContainer"></div>

    <button type="button" onclick="showMuscleGroups()">+ Добавить упражнение</button>

    <br><br>
    <button type="submit">Сохранить тренировку</button>
    <button type="button" onclick="goBack()">Назад</button>

</form>

<script src="api.js"></script>
<script src="add.js"></script>
</body>
</html>
